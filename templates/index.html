{% extends "base.html" %}

{% block content %}
<div class="map-wrapper">
    <div id="map"></div>
</div>

<div class="filter-panel">
    <h3>🔍 Accessibility Filters</h3>
    <div class="filter-group">
        <label><input type="checkbox" onchange="toggleFilter('wheelchair')"> ♿ Wheelchair Ramp</label>
        <label><input type="checkbox" onchange="toggleFilter('audio')"> 🔊 Audio Booth</label>
        <label><input type="checkbox" onchange="toggleFilter('braille')"> ⠿ Braille Materials</label>
    </div>

    <div style="margin-top:0.8rem; padding-top:0.8rem; border-top:1px solid var(--border)">
      <div style="font-size:0.72rem; color:var(--text-muted); margin-bottom:0.3rem; font-weight:600">
        📍 Filter by Region
      </div>
      <div class="filter-group">
        <label><input type="checkbox" onchange="toggleFilter('region', 'Tamil Nadu')"> Tamil Nadu</label>
        <label><input type="checkbox" onchange="toggleFilter('region', 'Puducherry')"> Puducherry</label>
        <label><input type="checkbox" onchange="toggleFilter('region', 'Kerala')"> Kerala</label>
      </div>
    </div>
</div>

<div class="legend-panel">
    <div style="font-size:0.72rem; color:var(--text-muted); margin-bottom:0.4rem; font-weight:600">Accessibility Rating</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--access-high)"></div> High (4.0 – 5.0)</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--access-mid)"></div> Moderate (2.5 – 3.9)</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--access-low)"></div> Limited (0 – 2.4)</div>
</div>

<button class="locate-btn" onclick="locateMe()" title="Find stations near me">📍</button>
{% endblock content %}

{% block extra_scripts %}
<script>
    // Map initialisation is now managed by map.js after it fetches the data.
    // This block can be used for page-specific overrides if needed.
</script>
{% endblock extra_scripts %}
