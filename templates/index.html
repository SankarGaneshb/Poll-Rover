{% extends "base.html" %}

{% block content %}
<div class="map-wrapper">
    <div id="map"></div>
</div>

<div class="filter-panel">
    <h3>🔍 Accessibility Filters</h3>
    <div class="filter-group">
        <label><input type="checkbox" onchange="toggleFilter('wheelchair')"> ♿ Wheelchair Ramp</label>
        <label><input type="checkbox" onchange="toggleFilter('audio')"> 🔊 Audio Booth</label>
        <label><input type="checkbox" onchange="toggleFilter('braille')"> ⠿ Braille Materials</label>
    </div>

    <div class="legend">
        <div style="font-size:0.72rem; color:var(--text-muted); margin-bottom:0.4rem; font-weight:600">Accessibility Rating</div>
        <div class="legend-item"><div class="legend-dot" style="background:#10B981"></div> High (4.0 – 5.0)</div>
        <div class="legend-item"><div class="legend-dot" style="background:#F59E0B"></div> Moderate (2.5 – 3.9)</div>
        <div class="legend-item"><div class="legend-dot" style="background:#EF4444"></div> Limited (0 – 2.4)</div>
    </div>
</div>

<button class="locate-btn" onclick="locateMe()" title="Find stations near me">📍</button>
{% endblock content %}

{% block extra_scripts %}
<script>
    // In a real Zola build, we'd load STATIONS from the GeoJSON generated by the pipeline
    fetch("{{ get_url(path='data/stations.geojson') }}")
        .then(res => res.json())
        .then(data => {
            // map.js expects STATIONS array for the chat logic
            // Converting GeoJSON back to the flat format for the demo logic
            window.STATIONS = data.features.map(f => ({
                station_id: f.properties.station_id,
                name: f.properties.name,
                address: f.properties.address,
                constituency: f.properties.constituency,
                state: f.properties.state,
                lat: f.geometry.coordinates[1],
                lng: f.geometry.coordinates[0],
                accessibility: {
                    rating: f.properties.accessibility_rating,
                    wheelchair_ramp: f.properties.wheelchair_ramp,
                    audio_booth: f.properties.audio_booth,
                    braille_materials: f.properties.braille_materials
                }
            }));
            initMap();
        });
</script>
{% endblock extra_scripts %}
