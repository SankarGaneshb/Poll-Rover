{% extends "base.html" %}

{% block content %}
<style>
    .directory-container {
        padding: 2rem;
        max-width: 1000px;
        margin: 0 auto;
        padding-top: 100px;
        min-height: 100vh;
    }
    .dir-header {
        margin-bottom: 3rem;
        text-align: center;
    }
    .search-wrap {
        position: relative;
        max-width: 600px;
        margin: 2rem auto;
    }
    #dir-search {
        width: 100%;
        padding: 1.2rem 1.5rem;
        background: var(--bg-glass);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        color: var(--text-primary);
        font-size: 1.1rem;
        transition: var(--transition);
    }
    #dir-search:focus {
        border-color: var(--accent);
        box-shadow: 0 0 15px var(--accent-glow);
        outline: none;
    }
    .grid-container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 1.5rem;
        margin-top: 2rem;
    }
    .dir-card {
        background: var(--bg-glass);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: 1.5rem;
        cursor: pointer;
        transition: var(--transition);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .dir-card:hover {
        border-color: var(--accent);
        transform: translateY(-3px);
    }
    .dir-card .info h3 { margin: 0; font-size: 1.2rem; }
    .dir-card .info p { margin: 0.3rem 0 0; color: var(--text-muted); font-size: 0.9rem; }
    .count-badge {
        background: var(--accent-glow);
        color: var(--accent);
        padding: 0.3rem 0.8rem;
        border-radius: 20px;
        font-weight: 700;
        font-size: 0.85rem;
    }
    .results-list {
        background: var(--bg-glass);
        border-radius: var(--radius-lg);
        overflow: hidden;
        border: 1px solid var(--border);
    }
    .station-item {
        padding: 1.2rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        text-decoration: none;
        color: inherit;
    }
    .station-item:hover { background: rgba(0,0,0,0.1); }
    .station-item .details h4 { margin: 0; color: var(--text-primary); }
    .station-item .details p { margin: 0.2rem 0; font-size: 0.85rem; color: var(--text-muted); }
    .loading-spinner {
        text-align: center;
        padding: 3rem;
        color: var(--text-muted);
    }
</style>

<div class="directory-container">
    <div class="dir-header">
        <h1>Polling Station Directory</h1>
        <p>Browse 73,000+ booths across India or use the search below.</p>
    </div>

    <div class="search-wrap">
        <input type="text" id="dir-search" placeholder="Search by name, ID or locality..." autocomplete="off">
        <div id="dir-results" class="hidden"></div>
    </div>

    <div id="dir-root">
         <div class="loading-spinner">Initializing directory...</div>
    </div>
</div>

<script>
    let SUMMARY = null;
    let SEARCH_INDEX = [];

    async function initDirectory() {
        try {
            // Remove leading slash for local/subdirectory hosting compatibility
            const resp = await fetch('../data/summary.json');
            SUMMARY = await resp.json();
            
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(position => {
                    renderNearby(position.coords);
                }, () => {
                    renderStates();
                });
            } else {
                renderStates();
            }
        } catch (e) { console.error("Directory init failed", e); }

        const input = document.getElementById('dir-search');
        input.addEventListener('input', handleSearch);
    }

    async function renderNearby(coords) {
        const root = document.getElementById('dir-root');
        root.innerHTML = '<h2>Stations Near You</h2><div class="loading-spinner">Locating stations within 50km...</div>';
        const districts = [];
        Object.keys(SUMMARY.states).forEach(stateKey => {
            const state = SUMMARY.states[stateKey];
            Object.keys(state.districts).forEach(distKey => {
                const dist = state.districts[distKey];
                const d = getDist(coords.latitude, coords.longitude, dist.lat, dist.lng);
                districts.push({ stateKey, distKey, dist: d, name: dist.name });
            });
        });
        districts.sort((a, b) => a.dist - b.dist);
        const closest = districts[0];
        if (closest && closest.dist < 100) await viewDistrict(closest.stateKey, closest.distKey, true);
        else renderStates();
    }

    function getDist(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    function renderStates() {
        const root = document.getElementById('dir-root');
        let html = '<div style="display:flex; justify-content:space-between; align-items:center"><h2>Browse by State</h2><button onclick="renderProximityManual()" style="background:none; border:none; color:var(--accent); cursor:pointer; font-weight:700">📍 Use My Location</button></div><div class="grid-container">';
        Object.keys(SUMMARY.states).forEach(key => {
            const state = SUMMARY.states[key];
            html += `<div class="dir-card" onclick="renderDistricts('${key}')"><div class="info"><h3>${state.name}</h3><p>${Object.keys(state.districts).length} Districts</p></div><span class="count-badge">${state.count} Booths</span></div>`;
        });
        root.innerHTML = html + '</div>';
    }

    function renderDistricts(stateKey) {
        const root = document.getElementById('dir-root');
        const state = SUMMARY.states[stateKey];
        let html = `<button onclick="renderStates()" style="color:var(--accent); cursor:pointer; font-weight:700; margin-bottom:1rem; border:none; background:none">← Back to States</button><h2>Districts in ${state.name}</h2><div class="grid-container">`;
        Object.keys(state.districts).forEach(distKey => {
            const dist = state.districts[distKey];
            html += `<div class="dir-card" onclick="viewDistrict('${stateKey}', '${distKey}')"><div class="info"><h3>${dist.name}</h3><p>Locality Directory</p></div><span class="count-badge">${dist.count}</span></div>`;
        });
        root.innerHTML = html + '</div>';
    }

    function renderProximityManual() { navigator.geolocation.getCurrentPosition(position => renderNearby(position.coords)); }

    async function viewDistrict(stateKey, distKey, isNearby = false) {
        const root = document.getElementById('dir-root');
        const state = SUMMARY.states[stateKey];
        const distName = state.districts[distKey].name;
        root.innerHTML = '<div class="loading-spinner">Loading district booths...</div>';
        try {
            const resp = await fetch(`../data/stations/${stateKey}/${distKey}.json`);
            const stations = await resp.json();
            let html = `<button onclick="${isNearby ? 'renderStates()' : `renderDistricts('${stateKey}')`}" style="color:var(--accent); cursor:pointer; font-weight:700; margin-bottom:1rem; border:none; background:none">← Back</button><h2>${isNearby ? '📍 Stations Near You' : 'Polling Stations'} in ${distName}</h2><div class="results-list">`;
            stations.forEach(s => {
                html += `<a href="/stations/detail/?id=${s.station_id}&loc=${stateKey}/${distKey}" class="station-item"><div class="details"><h4>${s.name}</h4><p>${s.assembly_constituency || 'General'} · ID: ${s.station_id}</p></div><span style="color:var(--accent)">View →</span></a>`;
            });
            root.innerHTML = html + '</div>';
        } catch (e) { root.innerHTML = '<p>Failed to load district data.</p>'; }
    }

    async function handleSearch(e) {
        const term = e.target.value.toLowerCase();
        const root = document.getElementById('dir-root');
        if (!term) { renderStates(); return; }
        if (SEARCH_INDEX.length === 0) {
            root.innerHTML = '<div class="loading-spinner">Fetching global index...</div>';
            try {
                const resp = await fetch('../data/search_index.json');
                SEARCH_INDEX = await resp.json();
            } catch (e) { return; }
        }
        const matches = SEARCH_INDEX.filter(s => s[1].toLowerCase().includes(term) || s[0].toLowerCase().includes(term)).slice(0, 50);
        let html = `<h2>Search Results (${matches.length})</h2><div class="results-list">`;
        matches.forEach(s => {
            html += `<a href="/stations/detail/?id=${s[0]}&loc=${s[2]}/${s[3]}" class="station-item"><div class="details"><h4>${s[1]}</h4><p>${s[2]} / ${s[3]} · ID: ${s[0]}</p></div><span style="color:var(--accent)">View →</span></a>`;
        });
        root.innerHTML = html + '</div>';
    }

    initDirectory();
</script>
{% endblock content %}
